services:
  backend:
    build:
      context: ./backend
    container_name: dk-photo-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DK_PHOTO_DATA_DIR: /app/data
      DK_PHOTO_DEFAULT_LIBRARY_PATH: /photos
    volumes:
      - ${APP_DATA_PATH:-./data}:/app/data
      - ${PHOTOS_PATH:-./photos}:/photos:ro
    ports:
      - "${BACKEND_BIND:-127.0.0.1}:${BACKEND_PORT:-8000}:8000"
    networks:
      - dk-photo-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
    container_name: dk-photo-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_BIND:-0.0.0.0}:${FRONTEND_PORT:-8080}:80"
    networks:
      - dk-photo-net

networks:
  dk-photo-net:
    driver: bridge
